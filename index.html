<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo-лист</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #16213e;
            padding: 30px;
            border-radius: 15px;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        #taskInput {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: white;
            font-size: 16px;
        }
        #taskInput::placeholder {
            color: #8a8fa8;
        }
        #addBtn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        #addBtn:hover {
            background: #c73652;
        }
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            justify-content: center;
        }
        .filter-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 15px;
            background: #0f3460;
            color: #a0aec0;
            cursor: pointer;
            font-size: 14px;
        }
        .filter-btn.active {
            background: #e94560;
            color: white;
        }
        #taskList {
            list-style: none;
            padding: 0;
        }
        #taskList li {
            background: #0f3460;
            padding: 10px 15px;
            margin-bottom: 6px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        #taskList li.completed {
            opacity: 0.5;
            text-decoration: line-through;
        }
        .task-text {
            flex: 1;
            cursor: pointer;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            font-size: 18px;
            cursor: pointer;
            padding: 0 5px;
        }
        .counter {
            color: #8a8fa8;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Список задач</h1>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Новая задача...">
            <button id="addBtn">Добавить</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="active">Активные</button>
            <button class="filter-btn" data-filter="completed">Выполненные</button>
        </div>

        <ul id="taskList"></ul>

        <div class="counter" id="counter">Осталось: 0</div>
    </div>

    <script>
        // === ВСЯ ЛОГИКА В ОДНОМ МЕСТЕ ===
        let tasks = [];
        let filter = 'all';

        // Элементы
        const input = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const list = document.getElementById('taskList');
        const counter = document.getElementById('counter');
        const filterBtns = document.querySelectorAll('.filter-btn');

        // Загрузка из localStorage
        if (localStorage.getItem('tasks')) {
            tasks = JSON.parse(localStorage.getItem('tasks'));
        }

        // Сохранение
        function save() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        // Отображение
        function render() {
            let filtered = tasks;
            if (filter === 'active') filtered = tasks.filter(t => !t.done);
            if (filter === 'completed') filtered = tasks.filter(t => t.done);

            list.innerHTML = '';
            filtered.forEach((task, i) => {
                const realIndex = tasks.indexOf(task);
                const li = document.createElement('li');
                if (task.done) li.className = 'completed';

                const text = document.createElement('span');
                text.className = 'task-text';
                text.textContent = task.text;
                text.onclick = () => {
                    tasks[realIndex].done = !tasks[realIndex].done;
                    save();
                    render();
                };

                const del = document.createElement('button');
                del.className = 'delete-btn';
                del.textContent = '✕';
                del.onclick = () => {
                    tasks.splice(realIndex, 1);
                    save();
                    render();
                };

                li.appendChild(text);
                li.appendChild(del);
                list.appendChild(li);
            });

            const left = tasks.filter(t => !t.done).length;
            counter.textContent = `Осталось: ${left}`;
        }

        // Добавление
        function add() {
            const text = input.value.trim();
            if (!text) return alert('Введите текст!');
            tasks.push({ text, done: false });
            save();
            render();
            input.value = '';
            input.focus();
        }

        // Фильтры
        filterBtns.forEach(btn => {
            btn.onclick = () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filter = btn.dataset.filter;
                render();
            };
        });

        // События
        addBtn.onclick = add;
        input.onkeypress = (e) => { if (e.key === 'Enter') add(); };

        // Старт
        render();
    </script>
</body>
</html>
